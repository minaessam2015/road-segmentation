# =========================================================
# U-Net + ResNet34 — Primary Configuration
# =========================================================
# Closest to the D-LinkNet winning approach on DeepGlobe.
# ResNet34 encoder with ImageNet pretrained weights.
# Strong skip connections for preserving thin road features.
# =========================================================

seed: 42

model:
  arch: "Unet"
  encoder_name: "resnet34"
  encoder_weights: "imagenet"
  in_channels: 3
  classes: 1

data:
  image_size: 512
  batch_size: 8
  num_workers: 4
  pin_memory: true
  val_split_ratio: 0.15
  val_split_seed: 42

augmentations:
  train:
    - name: "HorizontalFlip"
      params: { p: 0.5 }
    - name: "VerticalFlip"
      params: { p: 0.5 }
    - name: "RandomRotate90"
      params: { p: 0.5 }
    - name: "ShiftScaleRotate"
      params: { shift_limit: 0.1, scale_limit: 0.15, rotate_limit: 45, border_mode: 4, p: 0.5 }
    - name: "RandomBrightnessContrast"
      params: { brightness_limit: 0.2, contrast_limit: 0.2, p: 0.3 }
    - name: "HueSaturationValue"
      params: { hue_shift_limit: 10, sat_shift_limit: 20, val_shift_limit: 15, p: 0.3 }
  val: []

normalization:
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]

loss:
  type: "bce_dice"
  params:
    bce_weight: 0.5
    dice_weight: 0.5
    from_logits: true
    smooth: 1.0

optimizer:
  type: "adamw"
  lr: 1.0e-3
  weight_decay: 1.0e-4

scheduler:
  type: "cosine"
  params:
    eta_min: 1.0e-6

training:
  epochs: 50
  early_stopping_patience: 10
  early_stopping_metric: "val_iou"
  early_stopping_mode: "max"
  grad_accumulation_steps: 1
  mixed_precision: true
  freeze_encoder_epochs: 5
  encoder_lr_factor: 0.1

checkpoint:
  save_dir: "checkpoints"
  save_best: true
  save_last: true

logging:
  log_dir: "logs"
  save_visualizations_every_n_epochs: 5
  num_visualization_samples: 6
  tensorboard: false
  wandb: false
  save_training_curves: true
