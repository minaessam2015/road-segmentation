name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ---------------------------------------------------------------
  # Stage 1: Code Quality — runs on every push (<2 min)
  # ---------------------------------------------------------------
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install ruff pip-audit

      - name: Lint (ruff)
        run: ruff check src/ tests/ scripts/

      - name: Unit tests
        run: pytest tests/ -v --tb=short --ignore=tests/test_e2e.py

      - name: Security scan (pip-audit)
        run: pip-audit --strict --ignore-vuln PYSEC-0 --skip-editable

  # ---------------------------------------------------------------
  # Stage 2: Docker Build, E2E Test, and Push to GHCR
  # ---------------------------------------------------------------
  docker:
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t road-segmentation:ci .

      - name: Verify imports inside container
        run: |
          docker run --rm road-segmentation:ci python -c "
          from road_segmentation.api.app import create_app
          from road_segmentation.api.optimize import ONNXInferenceEngine
          from road_segmentation.api.inference import InferenceEngine
          from road_segmentation.postprocessing.pipeline import run_pipeline
          print('All imports OK')
          "

      - name: Download model from W&B and run E2E test
        env:
          WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
        run: |
          # Download ONNX model inside container
          docker run --rm \
            -e WANDB_API_KEY=$WANDB_API_KEY \
            road-segmentation:ci \
            python -c "
          import wandb, shutil
          from pathlib import Path
          api = wandb.Api()
          artifact = api.artifact('minaessam/road-segmentation/road-segmentation-model:latest')
          dl = Path(artifact.download())
          # Copy ONNX to models/
          models = Path('models')
          models.mkdir(exist_ok=True)
          for f in dl.glob('*.onnx'):
              shutil.copy2(f, models / f.name)
              print(f'Downloaded: {f.name} ({f.stat().st_size/1e6:.0f} MB)')

          # Quick inference test
          from road_segmentation.api.optimize import ONNXInferenceEngine
          import numpy as np
          from PIL import Image
          import io

          onnx_file = list(models.glob('*_int8.onnx'))[0]
          engine = ONNXInferenceEngine(str(onnx_file), device='cpu')

          # Synthetic test image
          img = Image.fromarray(np.random.randint(0, 255, (1024, 1024, 3), dtype=np.uint8))
          buf = io.BytesIO()
          img.save(buf, format='PNG')
          result = engine.predict(buf.getvalue())

          assert result['mask'].shape == (1024, 1024), f'Wrong shape: {result[\"mask\"].shape}'
          assert 0 <= result['road_coverage_pct'] <= 100
          assert result['inference_time_ms'] > 0
          print(f'E2E test passed: {result[\"inference_time_ms\"]:.0f}ms, coverage={result[\"road_coverage_pct\"]}%')
          "
        # Requires WANDB_API_KEY secret in repo settings

      # --- Push to GitHub Container Registry ---
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and push image
        run: |
          IMAGE_TAG=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          docker tag road-segmentation:ci $IMAGE_TAG
          docker push $IMAGE_TAG
          echo "Pushed: $IMAGE_TAG"
          echo ""
          echo "Pull and run:"
          echo "  docker pull $IMAGE_TAG"
          echo "  docker run -p 8000:8000 -v ./models:/app/models $IMAGE_TAG"
