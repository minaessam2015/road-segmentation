name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------
  # Stage 1: Code Quality — runs on every push (<2 min)
  # ---------------------------------------------------------------
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install ruff pip-audit

      - name: Lint (ruff)
        run: ruff check src/ tests/ scripts/

      - name: Unit tests
        run: pytest tests/ -v --tb=short

      - name: Security scan (pip-audit)
        run: pip-audit --strict || true  # warn but don't block on transitive deps
        continue-on-error: true

  # ---------------------------------------------------------------
  # Stage 2: Docker Build + Smoke Test — runs on push to main
  # ---------------------------------------------------------------
  docker:
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t road-segmentation:ci .

      - name: Verify image runs and imports work
        run: |
          docker run --rm road-segmentation:ci python -c "
          from road_segmentation.api.app import create_app
          from road_segmentation.api.optimize import ONNXInferenceEngine
          from road_segmentation.api.inference import InferenceEngine
          from road_segmentation.postprocessing.pipeline import run_pipeline
          print('All imports OK')
          "
