# ===========================================================
# Docker Compose for Road Segmentation Service
# ===========================================================
#
# Single command — model downloads automatically:
#   docker-compose up --build
#
# Or with pre-downloaded model:
#   mkdir -p models
#   curl -L "https://drive.google.com/uc?export=download&id=1vliNHcQ2fQ13Tk9VRDRPEllmwdoVzN6X" \
#     -o models/UnetPlusPlus_efficientnet-b4_int8.onnx
#   docker-compose up --build
#
# ===========================================================

services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./results:/app/results
    environment:
      - PYTHONUNBUFFERED=1
      - DEVICE=cpu
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; r=requests.get('http://localhost:8000/health'); exit(0 if r.ok else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
