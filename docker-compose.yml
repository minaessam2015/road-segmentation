# ===========================================================
# Docker Compose for Road Segmentation Service
# ===========================================================
#
# Option A: Auto-download model from W&B (single command):
#   echo "WANDB_API_KEY=your_key" > .env
#   docker-compose up
#
# Option B: Mount pre-downloaded model:
#   docker-compose up
#   (place ONNX files in ./models/ first)
#
# ===========================================================

services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./results:/app/results
    environment:
      - PYTHONUNBUFFERED=1
      - DEVICE=cpu
      - WANDB_API_KEY=${WANDB_API_KEY:-}
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; r=requests.get('http://localhost:8000/health'); exit(0 if r.ok else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
